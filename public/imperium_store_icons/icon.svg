<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Imperium icon</title>
  <desc id="desc">Dark navy square icon with cyan border, cyan top bars, and a bold white stylized M.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#07172f"/>
      <stop offset="58%" stop-color="#030b19"/>
      <stop offset="100%" stop-color="#010711"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22cfff"/>
      <stop offset="100%" stop-color="#00a7f0"/>
    </linearGradient>
    <linearGradient id="whiteFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f5f7"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="cyanGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#00cfff" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGlow)"/>
  <rect x="25" y="25" width="974" height="974" fill="none" stroke="#00cfff" stroke-width="2.5"/>

  <g filter="url(#cyanGlow)">
    <rect x="147" y="154" width="120" height="106" fill="url(#cyan)"/>
    <rect x="322" y="154" width="556" height="106" fill="url(#cyan)"/>
  </g>

  <path filter="url(#softShadow)" fill="url(#whiteFace)" d="
    M147 314
    H302
